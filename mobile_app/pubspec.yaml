name: shwe_htoo_thit_mobile
description: Flutter mobile sales app for the Shwe Htoo Thit POS backend.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  geolocator: ^14.0.2
  http: ^1.2.1
  path: ^1.9.1
  pdf: ^3.11.1
  printing: ^5.13.4
  shared_preferences: ^2.2.3
  speech_to_text: ^7.3.0
  sqflite: ^2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
  assets:
    - assets/thubatemin_oil.jpg
